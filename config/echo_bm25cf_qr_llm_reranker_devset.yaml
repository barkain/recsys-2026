# Echo: BM25+CF + QR + LLM reranker — CPU only, no model downloads
# Stack: BM25+CF retrieve → user-profile rerank → LLM listwise rerank → Claude generate
# This is our current blind submission stack + QR + LLM reranker, measurable on devset
lm_type: "null"
retrieval_type: "bm25_cf"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
use_reranker: true
reranker_alpha: 0.3
candidate_k: 50
bm25_weight: 0.5
cf_weight: 0.5
rrf_k: 60
use_query_reformulation: true
query_reformulation_model: "claude-haiku-4-5-20251001"
use_llm_reranker: true
llm_reranker_model: "claude-haiku-4-5-20251001"
llm_reranker_window: 50
