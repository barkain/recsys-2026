# Echo's primary config: Hybrid retrieval (BM25 + E5) + Claude Haiku generation
lm_type: "null"
retrieval_type: "hybrid"
dense_model: "intfloat/e5-base-v2"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cuda"
attn_implementation: "eager"
use_reranker: false
reranker_alpha: 0.3
candidate_k: 50
