# Echo's ablation config: Hybrid retrieval + LLM query reformulation (no reranker)
lm_type: "claude-haiku-4-5-20251001"
retrieval_type: "hybrid"
dense_model: "intfloat/e5-base-v2"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cuda"
attn_implementation: "eager"
use_reranker: false
candidate_k: 50
use_query_reformulation: true
query_reformulation_model: "claude-haiku-4-5-20251001"
