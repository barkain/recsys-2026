lm_type: "claude-haiku-4-5-20251001"
retrieval_type: "bm25"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
use_reranker: false
candidate_k: 100
use_query_reformulation: false
use_dual_qr: true
query_reformulation_model: "claude-haiku-4-5-20251001"
use_llm_reranker: true
llm_reranker_model: "claude-sonnet-4-6"
llm_reranker_window: 20
# v20 ablation experiment
# Changes vs v19:
#   1. llm_reranker_window: 50 → 20 (ablation: revert window to v16 size)
# Keeps from v19:
#   - NLQ query passed to LLM reranker as explicit search signal
#   - _get_already_played bug fix (dict-format content)
#   - _format_candidates track_id safety fix
# Hypothesis: nDCG restores to ~0.110 (v16 level) while LexDiv stays at ~0.90 (v19 level)
#             → estimated composite ~0.515 vs v16's 0.503
