# Echo: BM25 + QR + LLM reranker — CPU only, no model downloads
# Baseline: pure BM25 (~0.065 nDCG last-turn on devset)
# Additions: Claude QR (enriched query) + Claude LLM listwise reranker
# Purpose: measure how much QR + LLM reranker lifts BM25 retrieval
lm_type: "null"
retrieval_type: "bm25"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
candidate_k: 50
use_reranker: false
use_query_reformulation: true
query_reformulation_model: "claude-haiku-4-5-20251001"
use_llm_reranker: true
llm_reranker_model: "claude-haiku-4-5-20251001"
llm_reranker_window: 50
